- id: possible-secret-literal
  category: secrets
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*"
  patterns:
    - "api_key"
    - "apikey"
    - "client_secret"
    - "private_key"
    - "jwt_secret"
    - "BEGIN PRIVATE KEY"
  nearby_terms:
    - "="
    - ":"
  reason: "Potential hardcoded secret or key material."
  review_prompt: "Confirm whether the value is real, exposed, and requires rotation without printing it."
- id: missing-auth-route-candidate
  category: authz
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/route.ts"
    - "**/route.tsx"
    - "**/pages/api/**/*.ts"
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rb"
  patterns:
    - "export async function GET"
    - "export async function POST"
    - "export async function PUT"
    - "export async function PATCH"
    - "export async function DELETE"
    - "@app.get("
    - "@app.post("
    - "@router.get("
    - "@router.post("
    - "router.get("
    - "app.get("
    - "@GetMapping"
    - "@PostMapping"
    - "[HttpGet"
    - "[HttpPost"
    - "Route::get("
    - "Route::post("
    - "before_action"
  nearby_terms:
    - "admin"
    - "delete"
    - "billing"
    - "users"
    - "projects"
  reason: "Sensitive-looking route handler that may need explicit auth and authorization review."
  review_prompt: "Inspect direct handler and middleware context before deciding whether auth is missing."
- id: user-controlled-url-fetch
  category: ssrf
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rs"
  patterns:
    - "fetch("
    - "requests.get("
    - "http.Get("
    - "urlopen("
    - "Net::HTTP.get"
    - "RestTemplate"
    - "HttpClient"
    - "file_get_contents("
    - "reqwest::"
  nearby_terms:
    - "url"
    - "webhook"
    - "proxy"
    - "preview"
    - "import"
  reason: "Potential user-controlled URL fetch or proxy path."
  review_prompt: "Check URL origin, scheme, IP range, redirect, timeout, and response-size controls."
- id: dynamic-query-construction
  category: injection
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rs"
  patterns:
    - "execute(f"
    - "query +"
    - "$queryRawUnsafe"
    - "db.raw("
    - "fmt.Sprintf(\"SELECT"
    - "createQuery("
    - "FromSqlRaw("
    - "DB::raw("
    - "whereRaw("
    - "find_by_sql"
    - "sqlx::query("
  nearby_terms:
    - "select"
    - "where"
    - "order by"
    - "input"
  reason: "Potential dynamic query construction from untrusted input."
  review_prompt: "Confirm dataflow and replace string construction with parameterized queries."
- id: path-traversal-candidate
  category: injection
  severity_hint: medium
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rs"
  patterns:
    - "path.join("
    - "open("
    - "sendFile("
    - "os.Open("
    - "File.read("
    - "Paths.get("
    - "new File("
    - "System.IO.File"
    - "fopen("
    - "File.open("
  nearby_terms:
    - "filename"
    - "path"
    - "download"
    - "upload"
    - "archive"
  reason: "Potential user-controlled file path or traversal candidate."
  review_prompt: "Check canonicalization, base directory enforcement, and authorization for file access."
- id: unsafe-eval-or-deserialization
  category: injection
  severity_hint: critical
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.py"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
  patterns:
    - "eval("
    - "Function("
    - "pickle.loads("
    - "yaml.load("
    - "Marshal.load("
    - "ObjectInputStream"
    - "BinaryFormatter"
    - "unserialize("
  nearby_terms:
    - "input"
    - "body"
    - "params"
    - "payload"
  reason: "Potential unsafe code execution or deserialization."
  review_prompt: "Confirm whether untrusted data reaches eval or unsafe deserialization."
- id: browser-rendering-sink
  category: xss
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.vue"
    - "**/*.svelte"
    - "**/*.astro"
    - "**/*.html"
  patterns:
    - "dangerouslySetInnerHTML"
    - "innerHTML"
    - "v-html"
    - "{@html"
  nearby_terms:
    - "user"
    - "html"
    - "markdown"
    - "content"
    - "message"
  reason: "Potential untrusted browser rendering sink."
  review_prompt: "Confirm whether user/model content reaches HTML rendering without context-safe sanitization."
- id: permissive-cors-or-csrf-gap
  category: authz
  severity_hint: medium
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rb"
  patterns:
    - "Access-Control-Allow-Origin"
    - "allow_origins"
    - "csrf"
    - "SameSite=None"
  nearby_terms:
    - "*"
    - "credentials"
    - "cookie"
    - "session"
    - "disable"
  reason: "Potential CORS, cookie, or CSRF trust-boundary issue."
  review_prompt: "Check cookie-auth state changes, credentialed CORS, SameSite/Secure flags, and CSRF validation."
- id: command-execution-sink
  category: injection
  severity_hint: critical
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rs"
    - "**/*.ps1"
    - "**/*.psm1"
    - "**/*.bat"
    - "**/*.cmd"
  patterns:
    - "child_process"
    - "subprocess."
    - "os.system("
    - "exec.Command("
    - "Runtime.getRuntime().exec"
    - "ProcessBuilder"
    - "shell_exec("
    - "system("
    - "Command::new("
    - "Invoke-Expression"
    - "iex "
    - "Start-Process"
    - "cmd /c"
    - "powershell -Command"
  nearby_terms:
    - "input"
    - "args"
    - "command"
    - "user"
    - "model"
    - "tool"
  reason: "Potential command execution sink reachable from untrusted input."
  review_prompt: "Confirm whether untrusted input can select executable, arguments, shell mode, working directory, or environment."
