- id: ai-output-to-shell
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
    - "**/*.rs"
  patterns:
    - "subprocess."
    - "os.system("
    - "exec("
    - "spawn("
    - "child_process"
    - "exec.Command("
    - "Runtime.getRuntime().exec"
    - "ProcessBuilder"
    - "shell_exec("
    - "Command::new("
  nearby_terms:
    - "openai"
    - "anthropic"
    - "model"
    - "completion"
    - "tool"
    - "agent"
  reason: "Potential model or user-controlled input to command execution."
  review_prompt: "Confirm whether model output can influence command execution; prefer allowlists and human approval."
- id: prompt-with-privileged-tools
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
  patterns:
    - "tools:"
    - "tool_calls"
    - "function_call"
    - "runTools("
    - "agent.run"
    - "tool_choice"
    - "execute_tool"
    - "invokeTool"
  nearby_terms:
    - "delete"
    - "deploy"
    - "payment"
    - "shell"
    - "filesystem"
    - "browser"
  reason: "Potential excessive agency or missing approval boundary for privileged tools."
  review_prompt: "Review tool scope, authorization, tenant context, approval boundaries, and audit logging."
- id: retrieved-content-as-instructions
  category: ai-agentic
  severity_hint: medium
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
  patterns:
    - "retriever"
    - "vector"
    - "documents"
    - "context"
    - "rag"
  nearby_terms:
    - "system"
    - "instructions"
    - "follow"
    - "tools"
  reason: "Potential indirect prompt injection if retrieved content is treated as instructions."
  review_prompt: "Check whether retrieved content is quoted as untrusted data and whether tools remain constrained."
- id: model-output-to-browser-or-file
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
    - "**/*.php"
  patterns:
    - "writeFile"
    - "open("
    - "innerHTML"
    - "dangerouslySetInnerHTML"
    - "browser"
    - "page."
  nearby_terms:
    - "model"
    - "completion"
    - "assistant"
    - "llm"
    - "tool"
  reason: "Potential model output used as browser instruction, HTML, or filesystem input."
  review_prompt: "Confirm structured validation, allowlisted paths/actions, and approval gates before model output reaches the sink."
- id: agent-cost-or-resource-boundary
  category: availability
  severity_hint: medium
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
  patterns:
    - "max_tokens"
    - "while True"
    - "for await"
    - "stream"
    - "retry"
  nearby_terms:
    - "openai"
    - "anthropic"
    - "agent"
    - "completion"
    - "tool"
  reason: "Potential denial-of-wallet or runaway agent resource path."
  review_prompt: "Check quotas, timeouts, input limits, retry bounds, cancellation, and user/tenant cost attribution."
- id: agent-memory-write-boundary
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
  patterns:
    - "memory.add("
    - "memory.save("
    - "vectorstore.add"
    - "add_documents("
    - "upsert("
  nearby_terms:
    - "agent"
    - "user"
    - "retriev"
    - "instruction"
    - "tool"
  reason: "Untrusted content may persist into agent memory or shared retrieval state."
  review_prompt: "Check write authorization, provenance, tenant isolation, expiry, poisoning resistance, and whether stored content can later control tools."
- id: dynamic-agent-extension
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
  patterns:
    - "load_tool("
    - "registerTool("
    - "mcpServers"
    - "mcp_server"
    - "agent_card"
    - "a2a"
  nearby_terms:
    - "url"
    - "remote"
    - "discover"
    - "install"
    - "config"
    - "registry"
