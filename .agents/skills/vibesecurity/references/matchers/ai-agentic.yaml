- id: agent-delegated-identity
  category: ai-agentic
  severity_hint: high
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.java"
    - "**/*.cs"
  patterns:
    - "access_token"
    - "service_account"
    - "delegated_credentials"
    - "oauth_token"
    - "impersonate"
  nearby_terms:
    - "agent"
    - "tool"
    - "delegate"
    - "tenant"
    - "user"
  reason: "An agent may hold or delegate identity with broader privileges or lifetime than the active user and task."
  review_prompt: "Bind credentials to the user, tenant, task, audience, scope, and short lifetime; prevent confused-deputy and replay paths."
