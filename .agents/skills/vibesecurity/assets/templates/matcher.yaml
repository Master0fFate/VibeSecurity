# Restricted matcher YAML: use one-line scalar values and lists only.
# Categories: authz, authn, injection, ssrf, xss, secrets, supply-chain, ci-cd,
# ai-agentic, privacy, crypto, availability, or other.
- id: local-project-short-name
  category: other
  severity_hint: medium
  confidence_hint: medium
  globs:
    - "**/*.ts"
    - "**/*.py"
  patterns:
    - "risky case-insensitive substring"
  nearby_terms:
    - "optional contextual term"
  reason: "Why this candidate deserves manual review."
  review_prompt: "Confirm reachability, boundary crossing, impact, and safe remediation before reporting."
  positive_examples:
    - "Confirmed smell that should match."
  negative_examples:
    - "Benign pattern that should not become a finding."
