name: ci

on:
  push:
  pull_request:

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile helper scripts
        run: PYTHONDONTWRITEBYTECODE=1 python -m py_compile .agents/skills/vibesecurity/scripts/*.py
      - name: Run fixture regression tests
        run: PYTHONDONTWRITEBYTECODE=1 python .agents/skills/vibesecurity/tests/run_tests.py
